```properties
# ==========================================
# Application
# ==========================================
spring.application.name=portfolio-backend
server.address=0.0.0.0
server.port=8080

# ==========================================
# PostgreSQL Database
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:safdar}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Hibernate 6 automatically detects PostgreSQL.
# No need to specify hibernate.dialect.

# ==========================================
# CORS
# ==========================================
portfolio.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# ==========================================
# Email Configuration
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

portfolio.notification.email=${NOTIFICATION_EMAIL:}

# ==========================================
# Admin Credentials
# ==========================================
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=${JWT_SECRET:VGhpc0lzQVN1cGVyU2VjdXJlSldUU2VjcmV0S2V5Rm9yUG9ydGZvbGlvQXBwbGljYXRpb24xMjM0NTY3ODkw}
jwt.expiration=86400000

# ==========================================
# Logging
# ==========================================
logging.level.com.portfolio=INFO

# ==========================================
# File Upload
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=./uploads
